            <h1>အားလုံးဘဲ မင်္ဂလာပါခင်ဗျာ</h1> 
            <p>
                ကျွန်တော့်နာမည်ကတော့ ထူးထူးနိုင်လို့ခေါ်ပါတယ်ဗျ။ အခုကတော့ ကျွန်တော့်ရဲ့ ပထမဦးဆုံး ဝက်ဘ်ဆိုက်ကို စတင်ပြုလုပ်ခဲ့တာဖြစ်ပါတယ်။ 
                ကျွန်တော်ကတော့ ၂၀၁၀ ခုနှစ်မှာ မွေးဖွားခဲ့တာဖြစ်ပါတယ်ဗျ။ အခုကတော့ ကျွန်တော့်အကြောင်းလေးတွေ နည်းနည်းပြောရင်းနဲ့ 
                စိတ်ဝင်စားစရာကောင်းတဲ့ အကြောင်းတွေကိုလည်း တစ်ဆက်တည်း ပြောပြသွားမှာပါဗျ။
                ပထမဦးဆုံးအနေနဲ့ ကျွန်တော့်ရဲ့အကြောင်းလေးတွေ ပြောပြပါရစေ။
            </p>

ကျွန်တော့ရဲ့အိမ်မက်ကတော့ရိုးရှင်းလွန်းပါတယ်ပညာတတ်အောင်လုပ်မယ်၊အရွယ်ရောက်ရင်မိဘကိုလုပ်ကျွေးနိုင်အောင်လုပ်မယ်၊ပြီရင်တော့ကျွန်တော့ရဲ့ favourite country ဖြစ်တဲ့ Brazil နိုင်ငံလေးကိုသွားလည်ချင်တာပေါ့ဗျာ၊လည်ပြီရင်ပိုက်ဆံကိုရအောင်စုမယ်၊မိဘကိုကောင်းကောင်းမွန်မွန်နေရအောင်လုပ်မယ် အဲ့အရာတွေကိုပြီမြှောက်အောင်လုပ်ရမယ်။

<h1> ၃။ဘာသာရပ် </h1>
<p>

ကျွန်တော့မှာအကျင့်လေးတေတော့ရှိတယ်ဗျ အဲ့တာကစာသင်နေချိန်မာစာစိတ်မဝင်စားတာ၊သူငယ်ချင်းတေနဲ့စကားပြောတာ၊အိပ်ငိုက်တာ၊ပျင်းတာ အဲ့တာတေကတော့အခြားလူတေအမြင်မာအကျင့်ဆိုးဘဲပေါ့ ဒါပေမယ့်လဲကိုယ့်အမြင်မှာတော့နေရထိုင်ရသက်တောင့်သက်သာဖြစ်စေမဲ့အရာတေလို့ဘဲထင်ထားတာလေဗျာ။ကျွန်တော်ကတော့သခ်ျာ၂မှာလုံးဝကိုနားမလည်တာဗျို့။စသင်ကတည်းကလိုက်နားမထောင်လို့ဖြစ်မယ်ထင်တာဘဲဗျာ။ဒါပေမယ့်ကျန်တော်ကစိတ်ဝင်စားရင်အကုန်အလွယ်တတ်တယ်ဗျ။အဓိကလိုအပ်တာကစိတ်ဝင်စားမှုဘဲလေဗျာ။ဒါပေမယ့်လဲကျွန်တော်တို့လူငယ်တိုင်းမှာကသူ့အချိန်နဲ့သူလေ၊စကားပြောချင်တဲ့ချိန်ဆိုပြောရမာကျေနပ်တာ၊ဆရာ/ဆရာမဆူရင်တောင်ခိုးပြောရမှလေဗျာ၊စိတ်ဝင်စားတဲ့ချိန်ဆိုရင်လဲလွတ်စိတ်ဝင်စား​တာလေဗျာ၊ဒါပေမယ်သူကြိုက်တဲ့အရာတွေ့ပြီဆိုတာနဲ့အာရုံပြောင်းရောဘဲ၊ဒါကျွန်တော်တို့ရဲ့လူငယ်တေရဲ့ဖြစ်နေကြပုံစံလေးတေပေါ့ဗျာ။ကဲကျွန်တော့အကြောင်းနည်းနည်းလေးဆက်ရအောင် ကျွန်တော်ကသခ်ျာ၁မာတော့တော်တော်ကိုသိတယ်လို့ဘဲပြောရမာတစ်ခေါက်လေးဘဲနားထောင်လိုက်အကုန်တွက်တတ်သွားပြီး၊တစ်ခြားဘာရပ်တေကော်ဘဲဗျဖတ်တာလာ၊ကျက်တာလာ၊စဥ်းစားတာလာ အကုန်ရတယ်ဗျာ။ဒါပေမယ့်လဲစိတ်ဝင်စားတဲ့အချိန်မှပေါ့ဗျာ။တစ်ခုတော့ရှိတယ်ဗျ အဂ်လိပ်ချိန်ကြအမြဲငိုက်တာတော့ပြင်လို့မရသေးဘူးဗျာ။ဒါမဲ့ဆရာမသိအောင်ငိုက်ရတာဗျ။ကျန်တော်တို့ကတော့အဂ်လိပ်ဆရာကိုကျဲဲကြီးလို့ခေါ်ကြတာဗျ။လွတ်ကြိတ်တာဗျို့၊လက်ကသွေးကြောတေကတစ်ထောင်ထောင်နဲ့ဗျာ။ဒါပေမယ့်လဲငိုက်ကြတာဘဲပေါ့ဗျာ။တစ်ခို့ဆိုခေါင်းကြီးဆိုက်ပြီးထိုင်ရက်ကြီးအိပ်နေတာဗျ။ကျွန်တော်ကတော့မအိပ်အောင်ထိန်းရတာပေါ့ဗျာ။ကျန်တဲ့ဘာသာရပ်တေဆို​ရင်တော့သိပ်မငိုက်ဘူးဗျဒီဘာသာမှတော်တော်ဆိုးဆိုးပါဗျာ။

</p>
